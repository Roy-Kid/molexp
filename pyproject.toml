[project]
name = "molexp"
version = "0.2.0"
description = "Workflow and agent platform for research experiment management"
authors = [{name = "molcrafts"}]
license = {text = "BSD-3-Clause"}
requires-python = ">=3.12"

dependencies = [
    "pydantic>=2.5",
    "pydantic-graph>=0.0.20",
    "pyyaml>=6.0",
    "typer>=0.9.0",
    "rich>=13.0.0",
    "fastapi>=0.100.0",
    "uvicorn>=0.23.0",
]

[project.optional-dependencies]
agent = ["pydantic-ai>=0.0.20"]
remote = []                          # molq when published
all = ["molexp[agent,remote]"]
dev = [
    "molexp[all]",
    "pytest>=7.0",
    "pytest-asyncio>=0.21",
    "httpx>=0.24",
    "psutil>=5.9.0",
]

[project.scripts]
molexp = "molexp.cli:app"

[tool.ruff]
line-length = 100
target-version = "py312"

[tool.ruff.lint]
select = ["E", "F", "I"]
ignore = ["E501"]

[build-system]
requires = ["setuptools", "wheel"]
build-backend = "setuptools.build_meta"
