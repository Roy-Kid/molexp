[project]
name = "molexp"
version = "0.1.0"
description = "Minimal task graph framework with compiler, engine, and DSL"
authors = [{name = "OpenAI Agent"}]
requires-python = ">=3.12"
dependencies = [
    "pydantic>=2.5",
    "pyyaml>=6.0",
    "typer>=0.9.0",
    "rich>=13.0.0",
    "psutil>=5.9.0",
    "fastapi>=0.100.0",
    "uvicorn>=0.23.0",
]

[project.scripts]
molexp = "molexp.cli:app"

[project.entry-points."molexp.nodes"]
builtin = "molexp.workflow.nodes.register:register_builtin_nodes"

[build-system]
requires = ["setuptools", "wheel"]
build-backend = "setuptools.build_meta"
