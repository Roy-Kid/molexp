repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
        args: ['--unsafe']
      - id: check-added-large-files
        args: ['--maxkb=1024']
      - id: check-merge-conflict
      - id: mixed-line-ending
      - id: check-toml
      - id: check-json
        # tsconfig.json/tsconfig.*.json and devcontainer.json use JSON-with-
        # comments (JSONC), which the check-json hook cannot parse.
        exclude: '(^|/)(tsconfig(\..+)?\.json|devcontainer\.json)$'

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.12
    hooks:
      - id: ruff-format
      - id: ruff-check
        args: [--fix, --exit-non-zero-on-fix]

  - repo: local
    hooks:
      - id: ty
        name: ty (type check)
        entry: ty check
        language: system
        types: [python]
        pass_filenames: false
