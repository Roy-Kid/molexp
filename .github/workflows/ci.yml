name: CI

on:
  push:
    branches:
      - master
      - dev
  pull_request:

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install tools
        run: pip install ruff ty

      - name: Ruff format
        run: ruff format --check src/ tests/

      - name: Ruff lint
        run: ruff check src/ tests/

      - name: Type check (advisory)
        run: ty check src/
        continue-on-error: true

  test:
    name: Test on Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          # Tests rely on newer-than-PyPI behaviour of molcrafts-molq
          # (MOLCRAFTS_HOME honoured for JobStore redirection — added in
          # 0.5.0 on master, not yet released to PyPI). Pip ignores
          # [tool.uv.sources], so install the sibling repo from git first;
          # molexp's `molcrafts-molq>=0.2.0` pin is then satisfied by it.
          pip install "molcrafts-molq @ git+https://github.com/MolCrafts/molq.git"
          pip install -e ".[dev]"

      - name: Run tests
        run: pytest tests/ -q --cov=src/molexp --cov-report=xml

      - name: Upload coverage
        if: matrix.python-version == '3.12'
        uses: codecov/codecov-action@v4
        with:
          files: coverage.xml
          fail_ci_if_error: false
